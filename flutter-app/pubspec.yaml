name: swap_skills
description: Anonymous skill exchange platform mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  socket_io_client: ^2.0.0
  flutter_card_swiper: ^7.0.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  file_picker: ^8.0.0
  swipe_to: ^1.0.6
  flutter_linkify: ^6.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
